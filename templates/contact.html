<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>She Can Foundation</title>
        <link rel="stylesheet" href="{{url_for('static',filename='css/main.css')}}">
    </head>
    <body>
        <nav class="navbar">
            <a href="/" class="nav-logo"> She Can</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/about">About</a>
                <a href="/volunteer">Volunteer</a>
                <a href="/contact" class = "nav-cta">Contact Us</a>
            </div>
            <button class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
       <section class="page-hero">
  <h1>Contact <span>Us</span></h1>

  <p>
    We'd love to hear from you.
  </p>
</section>
       <section class="section">
        <div class="contact-wrap">
            <div class="contact-info reveal">
                <h3>Get in touch</h3>
                <p> Reach out to us for collaborations, volunteering,
        or any questions.</p>
                <div class="info-item">
                    <div class="info-icon">📧</div>
                    <div class="info-text">
                        <strong>Email: </strong>
                        <span>support@shecanfoundation.org</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">📍</div>
                    <div class="info-text">
                        <strong>Location: </strong>
                        <span>Delhi, India</span>
                    </div>
                </div>
            </div>
            <div class="form-card reveal">
                <form id="contactForm">
                    <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="name" placeholder="Enter your name">
                    <span class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your Email ID">
                    <span class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" placeholder="Write your message"></textarea>
                    <span class="error-msg"></span>
                </div>
                <button type="submit" class="btn-submit">Send message</button>
                <div id="contactToast" class="form-toast"></div>
                </form>
            </div>
        </div>
       </section>
       <footer>
            <div class="footer-bottom">
                <p>&copy; 2026 She Can Foundation. All rights Reserved. </p>
            </div>
        </footer>
        <script src="{{url_for('static',filename='js/main.js')}}"></script>
    </body>
</html>
